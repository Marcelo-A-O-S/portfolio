version: '3.8'

services:
  authservice:
    build: 
      context: ./AuthService/src
      dockerfile: ./AuthService.API/Dockerfile
    container_name: authservice:1.0
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
  gateway:
    build: 
      context: ./Gateway/src
      dockerfile: ./Gateway.API/Dockerfile
    container_name: gateway:1.0
    ports:
      - "5000:5000"
    depends_on:
      authservice:
       condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped