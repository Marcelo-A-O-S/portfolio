version: '3.8'
networks:
  backend-network:
    external: true
services:
  postservice:
    build: 
      context: ./PostService/src
      dockerfile: ./PostService.API/Dockerfile
    container_name: postservice
    image: postservice:1.0
    networks:
      - backend-network
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/api/health || Exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
  authservice:
    build: 
      context: ./AuthService/src
      dockerfile: ./AuthService.API/Dockerfile
    container_name: authservice
    image: authservice:1.0
    networks:
      - backend-network
    ports:
      - "5001:5001"
    depends_on:
      postservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/health || Exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
  gateway:
    build: 
      context: ./Gateway/src
      dockerfile: ./Gateway.API/Dockerfile
    container_name: gateway
    image: gateway:1.0
    networks:
      - backend-network
    ports:
      - "5000:5000"
    depends_on:
      postservice:
        condition: service_healthy
      authservice:
       condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || Exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped